name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (run all checks + npm publish --dry-run, do not actually publish)'
        type: boolean
        default: false

permissions:
  contents: write   # required to create GitHub Releases after publish
  id-token: write   # required for npm Trusted Publishing via OIDC

jobs:
  publish:
    name: Test, validate & publish
    runs-on: ubuntu-latest
    # Node 24 / npm v11+ is required for the OIDC handshake the npm registry
    # expects from trusted publishers (see npm/cli issues #9088, #8730 — Node
    # 20/22 ship npm v10 which sends an older handshake, registry refuses with
    # a misleading "404 not in this registry" instead of a clearer 401/403).
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Strip deprecated always-auth from generated .npmrc
        # setup-node@v4 still writes `always-auth=false` to the runner's
        # .npmrc, which npm v11+ flags as a deprecated config (see
        # actions/setup-node#1129). The line is cosmetic for our flow;
        # remove it so the publish log stays warning-free.
        run: |
          NPMRC="${HOME}/.npmrc"
          if [ -f "$NPMRC" ]; then
            sed -i '/^always-auth/d' "$NPMRC"
            echo "Stripped always-auth from $NPMRC"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Confirm tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Run structural validators
        run: npm run validate

      - name: Smoke E2E — install + update + agent list on a fresh tarball
        env:
          WIZE_SKIP_BASELINE: '1'              # don't try to run a harness CLI in CI
          WIZE_DISABLE_UPDATE_CHECK: '1'       # don't ping the registry mid-smoke
        run: |
          set -euo pipefail

          # 1. Pack the kit.
          TARBALL=$(npm pack --silent | tail -1)
          ABS_TARBALL="${GITHUB_WORKSPACE}/${TARBALL}"

          # 2. Install the tarball into a clean throwaway project. We deliberately
          #    avoid `npx <tarball>` — npx attempts to execute the tarball path
          #    directly as a script before extracting, which fails with
          #    "Permission denied" (exit 126) on the runner. `npm install <tarball>`
          #    extracts properly and sets the bin executable bit.
          TOOLS_DIR="$(mktemp -d)"
          (
            cd "$TOOLS_DIR"
            npm init -y --silent >/dev/null
            npm install --silent --no-audit --no-fund "$ABS_TARBALL"
          )
          WIZE="$TOOLS_DIR/node_modules/.bin/wize-dev-kit"
          test -x "$WIZE" || { echo "::error::wize-dev-kit bin not executable at $WIZE"; ls -la "$TOOLS_DIR/node_modules/.bin"; exit 1; }

          # 3. Run install against an empty greenfield repo.
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          git init -q
          git config user.email "smoke@wize.dev"
          git config user.name "Smoke"

          # Non-TTY install — falls back to number-based prompts and uses defaults.
          # Order of newlines mirrors cmdInstall prompts: project_name, profiles,
          # ide_targets, communication_language, document_output_language, user_name,
          # gitignore_confirm. Greenfield repo (no signals beyond .git), so no
          # brownfield prompt is asked.
          printf 'smoke-test\n\n\n\n\nSmoke\n\n' | "$WIZE" install

          # 4. Hard assertions: the install produced what it promised.
          test -d .wize                                       || { echo "::error::.wize/ not created";          exit 1; }
          test -f .wize/config/project.toml                   || { echo "::error::project.toml missing";       exit 1; }
          test -f .wize/config/user.toml                      || { echo "::error::user.toml missing";          exit 1; }
          test -f .claude/skills/wize-orchestrator/SKILL.md   || { echo "::error::claude adapter missing";     exit 1; }
          test -f .wize/agents/wize-orchestrator.md           || { echo "::error::generic adapter missing";    exit 1; }
          grep -q '^kit_version' .wize/config/project.toml    || { echo "::error::kit_version not written";    exit 1; }

          # 5. update is idempotent and reports kit version.
          "$WIZE" update | tee /tmp/update.log
          grep -q 'Wize Dev Kit update' /tmp/update.log       || { echo "::error::update did not run";         exit 1; }

          # 6. agent list returns built-ins + custom block.
          "$WIZE" agent list | tee /tmp/agentlist.log
          grep -q 'wize-orchestrator'    /tmp/agentlist.log   || { echo "::error::agent list missing orchestrator"; exit 1; }
          grep -q 'Custom / override agents' /tmp/agentlist.log || { echo "::error::agent list missing custom block"; exit 1; }

          echo "::notice::Smoke E2E passed"

      - name: Publish to npm (Trusted Publishing + provenance)
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance

      - name: Publish dry-run
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --provenance --dry-run

      - name: Extract this version's CHANGELOG entry
        if: ${{ inputs.dry_run != true && startsWith(github.ref, 'refs/tags/v') }}
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Slice CHANGELOG.md from `## [VERSION]` (exclusive) to the next `## [` header.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]"          { in_block=1; print; next }
            in_block && $0 ~ "^## \\["      { exit }
            in_block                        { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::warning::No CHANGELOG entry for $VERSION; using auto-generated notes."
            echo "no_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_changelog=false" >> "$GITHUB_OUTPUT"
            echo "── release notes preview ──"
            head -30 /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.no_changelog == 'true' && '' || '/tmp/release-notes.md' }}
          generate_release_notes: ${{ steps.changelog.outputs.no_changelog == 'true' }}
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false
